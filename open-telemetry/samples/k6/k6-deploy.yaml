apiVersion: apps/v1
kind: Deployment
metadata:
  name: xk6-tracing
spec:
  selector:
    matchLabels:
      app: xk6-tracing
      name: xk6-tracing
  template:
    metadata:
      labels:
        app: xk6-tracing
        name: xk6-tracing
    spec:
      containers:
      - env:
        - name: ENDPOINT
          value: otel-gateway.monitoring:4317
        image: ghcr.io/grafana/xk6-client-tracing:v0.0.9
        imagePullPolicy: IfNotPresent
        name: xk6-tracing
