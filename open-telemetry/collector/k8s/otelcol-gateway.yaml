---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otelcol-gateway-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otelcol-gateway-role
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - nodes/metrics
      - nodes/stats
      - services
      - endpoints
      - pods
      - namespaces
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - replicasets
    verbs: ["get", "list", "watch"]
  - nonResourceURLs:
      - /metrics
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otelcol-gateway-binding
subjects:
  - kind: ServiceAccount
    name: otelcol-gateway-sa
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: otelcol-gateway-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otelcol-gateway
spec:
  selector:
    matchLabels:
      app: otelcol-gateway
  template:
    metadata:
      labels:
        app: otelcol-gateway
    spec:
      serviceAccountName: otelcol-gateway-sa
      containers:
      - name: otelcol-gateway
        image: otelcol:v1
        command:
        - "/otelcol-contrib"
        - "--config=/conf/otelcol-gateway-config"
        ports:
        - containerPort: 4317 # OTLP gRPC
        - containerPort: 4318 # OTLP HTTP
        volumeMounts:
        - name: otelcol-gateway-config
          mountPath: /conf
      volumes:
        - name: otelcol-gateway-config
          configMap:
            name: otelcol-gateway-config
            items:
              - key: otelcol-gateway-config
                path: otelcol-gateway-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otelcol-gateway-config
data:
  otelcol-gateway-config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
      resourcedetection:
        detectors: [ "env", "system" ]
        override: false
      resource:
        attributes:
          - key: "k8s.cluster.name"
            value: "node-01"
            action: upsert
      attributes/add_cluster:
        actions:
          - key: cluster
            value: "node-01" # Add Cluster Name
            action: insert
      k8sattributes:

    exporters:
      debug:
        verbosity: detailed
      otlphttp:
        endpoint: http://192.168.100.2:4318 # otel-gateway-backend  DNS 추가
        tls:
          insecure: true
    service:
      telemetry:
        logs:
          level: debug
      pipelines:
        logs/otlp:
          receivers: [ otlp ]
          processors: [ batch, resource, resourcedetection, k8sattributes, attributes/add_cluster ]
          exporters: [ otlphttp ]
        traces/otlp:
          receivers: [ otlp ]
          processors: [ batch, resource, resourcedetection, k8sattributes, attributes/add_cluster ]
          exporters: [ otlphttp ]
        metrics/otlp:
          receivers: [ otlp ]
          processors: [ batch, resource, resourcedetection, k8sattributes, attributes/add_cluster ]
          exporters: [ otlphttp ]
---
apiVersion: v1
kind: Service
metadata:
  name: otelcol-gateway
spec:
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318
  selector:
    app: otelcol-gateway
