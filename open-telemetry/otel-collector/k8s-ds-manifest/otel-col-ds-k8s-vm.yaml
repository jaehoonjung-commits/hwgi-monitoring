---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-role
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - nodes/metrics
      - nodes/stats
      - services
      - endpoints
      - pods
      - namespaces
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - nonResourceURLs:
      - /metrics
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-binding
subjects:
  - kind: ServiceAccount
    name: otel-collector-sa
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: otel-collector-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-conf
data:
  otel-collector-config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      journald:
        directory: /var/log/journal
      prometheus:
        config:
          scrape_configs:
          - job_name: prometheus-node-exporter
            kubernetes_sd_configs:
            - role: endpoints
            honor_labels: false
            relabel_configs:
            - action: keep
              source_labels:
              - __meta_kubernetes_service_label_app_kubernetes_io_instance
              regex: node-exporter
            - action: keep
              source_labels:
              - __meta_kubernetes_service_label_app_kubernetes_io_name
              regex: prometheus-node-exporter
            - action: keep
              source_labels:
              - __meta_kubernetes_endpoint_port_name
              regex: metrics
            - source_labels:
              - __meta_kubernetes_endpoint_address_target_kind
              - __meta_kubernetes_endpoint_address_target_name
              separator: ;
              regex: Node;(.*)
              replacement: $${1}
              target_label: node
            - source_labels:
              - __meta_kubernetes_endpoint_address_target_kind
              - __meta_kubernetes_endpoint_address_target_name
              separator: ;
              regex: Pod;(.*)
              replacement: $${1}
              target_label: pod
            - source_labels:
              - __meta_kubernetes_pod_name
              target_label: pod
            - source_labels:
              - __meta_kubernetes_pod_container_name
              target_label: container
            - source_labels:
              - __meta_kubernetes_namespace
              target_label: namespace
            - source_labels:
              - __meta_kubernetes_service_name
              target_label: service
            - source_labels:
              - __meta_kubernetes_service_name
              target_label: job
              replacement: $${1}
            - source_labels:
              - __meta_kubernetes_service_label_jobLabel
              target_label: job
              regex: (.+)
              replacement: $${1}
            - target_label: endpoint
              replacement: metrics
            metric_relabel_configs:
            - source_labels:
              - mountpoint
              regex: /var/lib/kubelet/pods.+
              action: drop
          - job_name: kube-api-server
            kubernetes_sd_configs:
            - role: endpoints
              namespaces:
                names:
                - default
            honor_labels: false
            scheme: https
            relabel_configs:
            - action: keep
              source_labels:
              - __meta_kubernetes_service_label_component
              regex: apiserver
            - action: keep
              source_labels:
              - __meta_kubernetes_service_label_provider
              regex: kubernetes
            - action: keep
              source_labels:
              - __meta_kubernetes_endpoint_port_name
              regex: https
            - source_labels:
              - __meta_kubernetes_endpoint_address_target_kind
              - __meta_kubernetes_endpoint_address_target_name
              separator: ;
              regex: Node;(.*)
              replacement: $${1}
              target_label: node
            - source_labels:
              - __meta_kubernetes_endpoint_address_target_kind
              - __meta_kubernetes_endpoint_address_target_name
              separator: ;
              regex: Pod;(.*)
              replacement: $${1}
              target_label: pod
            - source_labels:
              - __meta_kubernetes_pod_name
              target_label: pod
            - source_labels:
              - __meta_kubernetes_pod_container_name
              target_label: container
            - source_labels:
              - __meta_kubernetes_namespace
              target_label: namespace
            - source_labels:
              - __meta_kubernetes_service_name
              target_label: service
            - source_labels:
              - __meta_kubernetes_service_name
              target_label: job
              replacement: $${1}
            - source_labels:
              - __meta_kubernetes_service_label_component
              target_label: job
              regex: (.+)
              replacement: $${1}
            - target_label: endpoint
              replacement: https
            tls_config:
              ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              server_name: kubernetes
            bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          - job_name: kube-state-metrics
            kubernetes_sd_configs:
            - role: endpoints
              namespaces:
                names:
                - monitoring
            honor_labels: true
            relabel_configs:
            - action: keep
              source_labels:
              - __meta_kubernetes_service_label_app_kubernetes_io_instance
              regex: kube-state-metrics
            - action: keep
              source_labels:
              - __meta_kubernetes_service_label_app_kubernetes_io_name
              regex: kube-state-metrics
            - action: keep
              source_labels:
              - __meta_kubernetes_endpoint_port_name
              regex: http
            - source_labels:
              - __meta_kubernetes_endpoint_address_target_kind
              - __meta_kubernetes_endpoint_address_target_name
              separator: ;
              regex: Node;(.*)
              replacement: $${1}
              target_label: node
            - source_labels:
              - __meta_kubernetes_endpoint_address_target_kind
              - __meta_kubernetes_endpoint_address_target_name
              separator: ;
              regex: Pod;(.*)
              replacement: $${1}
              target_label: pod
            - source_labels:
              - __meta_kubernetes_pod_name
              target_label: pod
            - source_labels:
              - __meta_kubernetes_pod_container_name
              target_label: container
            - source_labels:
              - __meta_kubernetes_namespace
              target_label: namespace
            - source_labels:
              - __meta_kubernetes_service_name
              target_label: service
            - source_labels:
              - __meta_kubernetes_service_name
              target_label: job
              replacement: $${1}
            - source_labels:
              - __meta_kubernetes_service_label_app_kubernetes_io_name
              target_label: job
              regex: (.+)
              replacement: $${1}
            - target_label: endpoint
              replacement: http
            metric_relabel_configs:
            - regex: (uid|container_id|image_id)
              action: labeldrop
          - job_name: cadvisor
            kubernetes_sd_configs:
            - role: node
            honor_labels: true
            honor_timestamps: false
            scrape_interval: 30s
            scrape_timeout: 5s
            metrics_path: /metrics/cadvisor
            scheme: https
            relabel_configs:
            - source_labels:
              - __meta_kubernetes_node_name
              target_label: node
            - regex: __meta_kubernetes_node_label_(.+)
              action: labelmap
            - source_labels:
              - __metrics_path__
              target_label: metrics_path
            - target_label: job
              replacement: cadvisior
            metric_relabel_configs:
            - regex: (uid)
              action: labeldrop
            - regex: (id|name)
              action: labeldrop
            - source_labels:
              - __name__
              regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)
              action: drop
            tls_config:
              insecure_skip_verify: true
              ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          - job_name: kubelet
            kubernetes_sd_configs:
            - role: node
            honor_labels: true
            honor_timestamps: false
            scrape_interval: 30s
            scrape_timeout: 5s
            scheme: https
            relabel_configs:
            - source_labels:
              - __meta_kubernetes_node_name
              target_label: node
            - regex: __meta_kubernetes_node_label_(.+)
              action: labelmap
            - source_labels:
              - __metrics_path__
              target_label: metrics_path
            - target_label: job
              replacement: kubelet
            metric_relabel_configs:
            - regex: (uid)
              action: labeldrop
            - regex: (id|name)
              action: labeldrop
            - source_labels:
              - __name__
              regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)
              action: drop
            tls_config:
              insecure_skip_verify: true
              ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          - job_name: k8s-probes
            kubernetes_sd_configs:
            - role: node
            honor_labels: true
            honor_timestamps: false
            scrape_interval: 30s
            scrape_timeout: 5s
            metrics_path: /metrics/probes
            scheme: https
            relabel_configs:
            - source_labels:
              - __meta_kubernetes_node_name
              target_label: node
            - regex: __meta_kubernetes_node_label_(.+)
              action: labelmap
            - source_labels:
              - __metrics_path__
              target_label: metrics_path
            - target_label: job
              replacement: kubelet
            metric_relabel_configs:
            - regex: (uid)
              action: labeldrop
            - regex: (id|name)
              action: labeldrop
            - source_labels:
              - __name__
              regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)
              action: drop
            tls_config:
              insecure_skip_verify: true
              ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          - job_name: k8s-resources
            kubernetes_sd_configs:
            - role: node
            honor_labels: true
            honor_timestamps: false
            scrape_interval: 30s
            scrape_timeout: 5s
            metrics_path: /metrics/resource
            scheme: https
            relabel_configs:
            - source_labels:
              - __meta_kubernetes_node_name
              target_label: node
            - regex: __meta_kubernetes_node_label_(.+)
              action: labelmap
            - source_labels:
              - __metrics_path__
              target_label: metrics_path
            - target_label: job
              replacement: kubelet
            metric_relabel_configs:
            - regex: (uid)
              action: labeldrop
            - regex: (id|name)
              action: labeldrop
            - source_labels:
              - __name__
              regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)
              action: drop
            tls_config:
              insecure_skip_verify: true
              ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    processors:
      batch:
    exporters:
      debug:
        verbosity: detailed
      prometheusremotewrite:
        endpoint: http://vmsingle-vm-single:8428/api/v1/push
        external_labels:
          cluster: kw-home
          k8s.cluster.name: kw-home
      otlphttp/logs:
        endpoint: http://loki-gateway.monitoring.svc.cluster.local/otlp
        tls:
          insecure: true
      otlphttp/metrics:
        endpoint: http://vmsingle-vm-single.monitoring:84280/opentelemetry/v1/metrics
      otlphttp/traces:
        endpoint: http://tempo.monitoring.svc.cluster.local:4318
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
        metrics:
          receivers: [otlp, prometheus]
          processors: [batch]
          exporters: [prometheusremotewrite]
        logs:
          receivers: [otlp, journald]
          processors: [batch]
          exporters: [otlphttp/logs]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector-sa
      containers:
      - name: otel-collector
        image: otelcol:v1
        command:
        - "/otelcol-contrib"
        - "--config=/conf/otel-collector-config"
        ports:
        - containerPort: 4317 # OTLP gRPC
        - containerPort: 4318 # OTLP HTTP
        volumeMounts:
        - name: otel-collector-config-vol
          mountPath: /conf
        - name: journal-volume
          mountPath: /var/log/journal
          readOnly: true
      volumes:
        - name: otel-collector-config-vol
          configMap:
            name: otel-collector-conf
            items:
              - key: otel-collector-config
                path: otel-collector-config
        - name: journal-volume
          hostPath:
            path: /var/log/journal/
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
spec:
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318
  selector:
    app: otel-collector

