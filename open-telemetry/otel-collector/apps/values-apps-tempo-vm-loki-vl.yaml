mode: "deployment"

config:
  exporters:
    debug: {}
    otlphttp/logs:
      endpoint: http://loki-gateway.monitoring.svc.cluster.local/otlp
      tls:
        insecure: true
    otlphttp/victoriametrics:
      compression: gzip
      encoding: proto
      metrics_endpoint: http://vmsingle-vm-single:8428/opentelemetry/v1/metrics
      logs_endpoint: http://vlsingle-vl-single:9428/insert/opentelemetry/v1/logs
      tls:
        insecure: true
    otlphttp/traces:
      endpoint: http://tempo.monitoring.svc.cluster.local:4318
      tls:
        insecure: true
  extensions:
    health_check:
      endpoint: ${env:MY_POD_IP}:13133
  processors:
    batch: {}
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
  receivers:
    jaeger:
      protocols:
        grpc:
          endpoint: ${env:MY_POD_IP}:14250
        thrift_http:
          endpoint: ${env:MY_POD_IP}:14268
        thrift_compact:
          endpoint: ${env:MY_POD_IP}:6831
    otlp:
      protocols:
        grpc:
          endpoint: ${env:MY_POD_IP}:4317
        http:
          endpoint: ${env:MY_POD_IP}:4318
    prometheus:
      config:
        scrape_configs:
          - job_name: opentelemetry-collector
            scrape_interval: 10s
            static_configs:
              - targets:
                  - ${env:MY_POD_IP}:8888
    zipkin:
      endpoint: ${env:MY_POD_IP}:9411
  service:
    telemetry:
      resource:
        k8s.namespace.name: "${env:OTEL_K8S_NAMESPACE}"
        k8s.node.name: "${env:OTEL_K8S_NODE_NAME}"
        k8s.node.ip: "${env:OTEL_K8S_NODE_IP}"
        k8s.pod.name: "${env:OTEL_K8S_POD_NAME}"
        k8s.pod.ip: "${env:OTEL_K8S_POD_IP}"
        host.name: "${env:OTEL_K8S_NODE_NAME}"
      metrics:
        readers:
          - pull:
              exporter:
                prometheus:
                  host: ${env:MY_POD_IP}
                  port: 8888
    extensions:
      - health_check
    pipelines:
      logs:
        exporters:
          - debug
          - otlphttp/logs
        processors:
          - memory_limiter
          - batch
        receivers:
          - otlp
      metrics:
        exporters:
          - debug
          - otlphttp/victoriametrics
        processors:
          - memory_limiter
          - batch
        receivers:
          - otlp
          # if internalTelemetryViaOTLP.metrics.enabled = true, prometheus receiver will be removed
          - prometheus
      traces:
        exporters:
          - debug
          - otlphttp/traces
        processors:
          - memory_limiter
          - batch
        receivers:
          - otlp
          - jaeger
          - zipkin

image:
  # If you want to use the core image `otel/opentelemetry-collector`, you also need to change `command.name` value to `otelcol`.
  repository: "otel/opentelemetry-collector-contrib" 
  tag: ""
