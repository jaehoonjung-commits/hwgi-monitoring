# Routing rules: match by instance, severity, and recipient_group_name
routing:
  default_recipient_group_names: []
  rules:
    # Rule 1: instance-1에서 critical 알림 → dev-1 그룹만 수신
    - instance_pattern: "instance-1"
      severity: "critical"
      recipient_group_name: "dev-1"

    # Rule 2: instance-1에서 warning 알림 → dev-1 그룹만 수신
    - instance_pattern: "instance-1"
      severity: "warning"
      recipient_group_name: "dev-1"

    # Rule 3: instance-2에서 warning 알림 → infra-1 그룹만 수신
    - instance_pattern: "instance-2"
      severity: "warning"
      recipient_group_name: "infra-1"

    # Rule 4: instance-2에서 critical 알림 → infra-1 그룹만 수신
    - instance_pattern: "instance-2"
      severity: "critical"
      recipient_group_name: "infra-1"

