# -- Define the amount of instances
replicas: 1

persistence:
  enabled: true
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  size: 10Gi

tempo:
  retention: 744h
  storage:
    trace:
      backend: s3
      s3:
        bucket: traces
        endpoint: loki-minio.monitoring.svc:9000
        access_key: root-user
        secret_key: supersecretpassword
        insecure: true               
        forcepathstyle: true
  metricsGenerator:
    enabled: true
    processor: 
      service_graphs: {}
      span_metrics: {}
      local_blocks: {}
    traces_storage:
      path: "/tmp/traces"
    storage:
      remote_write: 
        # mimir
        #- url: "http://mimir-gateway.monitoring.svc:80/api/v1/push"
        # victoriametrics
        - url: "http://vmsingle-vmsingle-victoria-metrics-k8s-stack.monitoring.svc:8428/api/v1/write"
  overrides:
    defaults: 
      metrics_generator:
        processors:
          - service-graphs
          - span-metrics
          - local-blocks
