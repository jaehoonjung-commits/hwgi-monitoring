apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: victoria-collector
  namespace: default
spec:
  mode: daemonset
  serviceAccount: otel-collector-sa
  hostNetwork: true
  image: otel/opentelemetry-collector-contrib:latest
  # v1beta1에서는 config: 바로 뒤에 '|'를 붙여 전체 설정을 문자열로 전달합니다.
  config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      kubeletstats:
        collection_interval: 15s
        endpoint: "https://${env:K8S_NODE_NAME}:10250"
        auth_type: "kubelet"
        insecure_skip_verify: true
      filelog:
        include: [ /var/log/pods/*/*/*.log ]

    processors:
      batch: {}
      resourcedetection:
        detectors: [env, system, k8snode]

    exporters:
      otlphttp/metrics:
        metrics_endpoint: "http://vmsingle-sample.default.svc"
      otlphttp/logs:
        logs_endpoint: "http://vlsingle-sample.default.svc"
      otlphttp/traces:
        traces_endpoint: "http://vtsingle-sample.default.svc"

    service:
      pipelines:
        metrics:
          receivers: [otlp, kubeletstats]
          processors: [resourcedetection, batch]
          exporters: [otlphttp/metrics]
        logs:
          receivers: [otlp, filelog]
          processors: [resourcedetection, batch]
          exporters: [otlphttp/logs]
        traces:
          receivers: [otlp]
          processors: [resourcedetection, batch]
          exporters: [otlphttp/traces]
